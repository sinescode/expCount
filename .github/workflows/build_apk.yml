name: Build APKs (ARM64 + ARMv7)

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases

    steps:
    # 1️⃣ Checkout code
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for tag history
    
    # 2️⃣ Setup Java
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    # 3️⃣ Setup Flutter
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    
    # 4️⃣ Get dependencies
    - name: Get dependencies
      run: flutter pub get
    
    
    # 6️⃣ Build Signed Release APK
    - name: Build Signed Release APK
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        # Cleanup function for sensitive files
        cleanup() {
          rm -f android/app/release.keystore android/key.properties
        }
        trap cleanup EXIT
        
        # Check if secrets are available
        if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
          echo "⚠️ Warning: Signing secrets not configured. Building unsigned APK."
          flutter build apk --release --split-per-abi
        else
          echo "🔐 Setting up release signing..."
          echo "$KEYSTORE_BASE64" | base64 -di > android/app/release.keystore
          
          {
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=release.keystore"
          } > android/key.properties
          
          flutter build apk --release --split-per-abi
        fi

    # 7️⃣ Rename APKs with version
    - name: Rename APKs
      run: |
        # Get version from pubspec.yaml or use tag
        VERSION=$(grep 'version:' pubspec.yaml | head -n1 | awk '{print $2}' | cut -d'+' -f1)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
        mkdir -p build/app/outputs/flutter-apk/renamed
        cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
           "build/app/outputs/flutter-apk/renamed/ExpCount-${VERSION}-arm64.apk"
        cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
           "build/app/outputs/flutter-apk/renamed/ExpCount-${VERSION}-armv7a.apk"

    # 8️⃣ Upload artifacts (always available)
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: release-apks
        path: build/app/outputs/flutter-apk/renamed/*.apk
        retention-days: 30

    # 9️⃣ Create GitHub Release (only on tags)
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        name: "ExpCount ${{ github.ref_name }}"
        files: |
          build/app/outputs/flutter-apk/renamed/*.apk
        generate_release_notes: true
        prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
